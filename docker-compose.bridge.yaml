# Kimodo inference server: the model is preloaded once at FastAPI startup and
# inference runs in-process. The model stays resident in VRAM while the server
# runs (stop the api container to free it). The kimodo_motion HDA fetches the
# NPZ over HTTP, so the server can run on this machine or a remote GPU box.
#
# Lives alongside Kimodo's own docker-compose.yaml in the kimodo repo, hence the
# distinct filename — always pass it with -f.
# Usage (on the GPU host, from the kimodo dir):
#   MOCK_MODE=0 docker compose -f docker-compose.bridge.yaml up text-encoder -d  # wait until healthy
#   MOCK_MODE=0 docker compose -f docker-compose.bridge.yaml up api -d
services:
  text-encoder:
    image: kimodo:1.0
    container_name: text-encoder
    working_dir: /workspace
    command: python -m kimodo.scripts.run_text_encoder_server
    volumes:
      - ./:/workspace
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/workspace/.cache/huggingface
    ports:
      - "9550:9550"
    environment:
      - TEXT_ENCODER_DEVICE=cpu
      - HF_HOME=/workspace/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    healthcheck:
      # Hit /config (the gradio config endpoint kimodo's TextEncoderAPI fetches on
      # connect), not just / — otherwise "healthy" can race ahead of gradio being
      # ready and the api's model preload times out connecting to the encoder.
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:9550/config > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 120  # CPU model loading can take up to 10 minutes on first run

  api:
    image: kimodo:1.0
    container_name: kimodo-api
    working_dir: /workspace
    command: uvicorn kimodo_server:app --host 0.0.0.0 --port ${KIMODO_PORT:-8001}
    volumes:
      - ./:/workspace
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/workspace/.cache/huggingface
    ports:
      - "${KIMODO_PORT:-8001}:${KIMODO_PORT:-8001}"
    environment:
      - KIMODO_MODEL=${KIMODO_MODEL:-}   # model to preload at startup (blank = kimodo default)
      - MOCK_MODE=${MOCK_MODE:-0}   # 0 = live inference; 1 = serve dev_reference.npz
      - OUTPUT_DIR=/workspace/output
      - TEXT_ENCODER_URL=http://text-encoder:9550/
      - HF_HOME=/workspace/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      # Resident preloads the model at startup; load from the local HF cache and
      # avoid the network so a flaky/stalling HF download can't hang startup.
      # The model weights must already be cached (e.g. from a hybrid-mode run, or
      # `huggingface-cli download`). Set HF_HUB_OFFLINE=0 for a one-time download.
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-1}
      - HF_HUB_DISABLE_XET=1   # the hf_xet downloader was observed to hang on this setup
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      text-encoder:
        condition: service_healthy
