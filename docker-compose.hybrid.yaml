services:
  text-encoder:
    image: kimodo:1.0
    container_name: text-encoder
    working_dir: /workspace
    command: python -m kimodo.scripts.run_text_encoder_server
    volumes:
      - ./:/workspace
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/workspace/.cache/huggingface
    ports:
      - "9550:9550"
    environment:
      - TEXT_ENCODER_DEVICE=cpu
      - HF_HOME=/workspace/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    # No GPU reservation — text encoder runs on CPU to save VRAM
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:9550/ > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 120  # CPU model loading can take up to 10 minutes on first run

  demo:
    image: kimodo:1.0
    container_name: demo
    working_dir: /workspace
    command: >
      python -m kimodo.scripts.generate
      "a person walks forward"
      --duration 3
      --output /workspace/output/test.npz
    volumes:
      - ./:/workspace
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/workspace/.cache/huggingface
    environment:
      - TEXT_ENCODER_URL=http://text-encoder:9550/
      - HF_HOME=/workspace/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      text-encoder:
        condition: service_healthy

  api:
    image: kimodo:1.0
    container_name: kimodo-api
    working_dir: /workspace
    command: uvicorn kimodo_server:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./:/workspace
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/workspace/.cache/huggingface
    ports:
      - "8001:8001"
    environment:
      - MOCK_MODE=1        # set to 0 for live inference (requires text-encoder running)
      - OUTPUT_DIR=/workspace/output
      - TEXT_ENCODER_URL=http://text-encoder:9550/
      - HF_HOME=/workspace/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
